#
# XWiki state/backup include patterns for Restic
# Syntax reference: https://pkg.go.dev/path/filepath#Glob
# Restic --files-from: https://restic.readthedocs.io/en/stable/040_backup.html#including-files

# MariaDB dump (written by bin/module-dump-state before backup)
state/xwiki.sql

# DB passwords — stored in state, never in Redis
state/passwords.env

# XWiki config files generated by ExecStartPre scripts
state/xwiki.cfg
state/xwiki.properties

# XWiki permanent directory (wiki data, extensions, uploads)
volumes/xwiki-data

